app = "alphagraph"
primary_region = "nrt"   # Tokyo — closest to MOPS

[build]

[processes]
  web = "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
  taiwan_scheduler = "python -m backend.app.services.taiwan.scheduler"

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONPATH = "/app"

[[services]]
  processes = ["web"]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[mounts]]
  source = "alphagraph_data"
  destination = "/data"
  processes = ["web", "taiwan_scheduler"]

[[vm]]
  processes = ["web"]
  size = "shared-cpu-1x"
  memory = "512mb"

[[vm]]
  processes = ["taiwan_scheduler"]
  size = "shared-cpu-1x"
  memory = "1gb"
