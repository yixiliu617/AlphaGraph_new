# Alembic configuration for AlphaGraph.
#
# Run from the project root:
#   alembic -c backend/alembic.ini upgrade head
#   alembic -c backend/alembic.ini revision -m "describe change" --autogenerate
#
# The actual database URL is loaded from `backend.app.core.config.settings`
# in `alembic/env.py`, so this file leaves it blank; setting it here would
# just shadow the env-driven config.

[alembic]
# Path is relative to this file when invoked with -c.
script_location = alembic

# Use OS path separator on this platform (Windows works fine with forward slashes,
# but be explicit to avoid surprises).
version_path_separator = os

# Encoding for migration files (matches our project-wide UTF-8 convention).
output_encoding = utf-8

# DB URL is loaded from settings in env.py, not here.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks for now. Add `black` here later if we want auto-format
# on autogenerated migration files.

# Logging — quiet by default; bump to INFO when debugging migrations.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
