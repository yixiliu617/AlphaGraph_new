# Render service definitions.
#
# Why a YAML manifest instead of clicking through the dashboard:
#   - Reproducible deploys: a fresh Render account can `render blueprint apply`
#     and recreate the entire stack.
#   - Source-controlled config: changes to env vars / disk size / regions
#     show up in git diffs.
#   - Migration smoothness: the same shape (web service + worker + cron)
#     translates 1:1 to AWS ECS task definitions when we migrate.
#
# Usage:
#   1. Push this to GitHub.
#   2. In Render dashboard: New + → Blueprint → connect this repo.
#   3. Render creates the services + offers to set env vars.
#
# Pricing (2026, verify before commit):
#   - alphagraph-backend (web, starter $7/mo)
#   - alphagraph-scheduler (worker, starter $7/mo)
#   - alphagraph-data-disk (10 GB, $1/mo)
#   = ~$15/mo total when off the free tier.

services:

  # -------------------------------------------------------------------
  # Web — FastAPI under uvicorn
  # -------------------------------------------------------------------
  - type: web
    name: alphagraph-backend
    runtime: docker
    repo: https://github.com/yixiliu617/AlphaGraph_new
    branch: main
    region: singapore                                    # closest to Asian pilots; HK uses ~30ms
    plan: starter                                        # $7/mo; bump to standard when CPU-constrained
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: alphagraph-data
      mountPath: /app/backend/data
      sizeGB: 10                                         # parquets + IR PDFs; resize as it grows
    envVars:
      - key: PORT
        value: "8000"
      - key: WEB_CONCURRENCY
        value: "2"                                        # uvicorn workers; ~2x vCPU on starter
      - key: PYTHONIOENCODING
        value: utf-8
      # ---- secrets — set via Render dashboard, not committed ----
      - key: POSTGRES_URI
        sync: false                                       # Neon connection string
      - key: AUTH_DATABASE_URI
        sync: false                                       # usually same as POSTGRES_URI
      - key: SECRET_KEY
        generateValue: true                               # Render generates 32-byte random
      - key: TOKEN_ENCRYPTION_KEY
        sync: false                                       # paste output of: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # ---- OAuth — set via dashboard ----
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_OAUTH_CLIENT_ID
        sync: false
      - key: MICROSOFT_OAUTH_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_OAUTH_TENANT
        value: common
      # ---- LLM keys — set via dashboard ----
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ---- Public URLs — set after first deploy when Render assigns the URL ----
      - key: OAUTH_REDIRECT_BASE
        sync: false                                       # e.g. https://alphagraph-backend.onrender.com
      - key: FRONTEND_URL
        sync: false                                       # e.g. https://alphagraph.vercel.app
      - key: CORS_ORIGINS
        sync: false                                       # e.g. https://alphagraph.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://alphagraph-.*\.vercel\.app$       # allow vercel preview deploys
      # ---- Cookie flags — prod = strict cross-origin ----
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: "none"                                     # cross-origin (Render ↔ Vercel) needs SameSite=None
      # ---- App-level config ----
      - key: ENGINE_LLM
        value: anthropic
      - key: ACTIVE_LLM
        value: gemini

  # -------------------------------------------------------------------
  # Worker — APScheduler runner for the prices schedulers
  #
  # Same image as web, different startCommand. One worker handles all
  # prices.* jobs (US/TW/HK/JP/KR/CN daily + intraday + TWSE patch).
  # Add additional workers for taiwan/social/news/x as needed.
  # -------------------------------------------------------------------
  - type: worker
    name: alphagraph-prices-scheduler
    runtime: docker
    repo: https://github.com/yixiliu617/AlphaGraph_new
    branch: main
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    # NO `disk:` block — Render Disks attach to exactly ONE service. The
    # web service owns the disk (where the API serves parquets from);
    # the worker writes to ephemeral disk on each restart. Pilot-acceptable
    # because the worker mostly INSERTS into Postgres (heartbeats, sync
    # state), not parquets. When the worker DOES need to persist (price
    # backfill writes), the right answer is S3 — see Phase 3 of the
    # deployment_runbook. Until then, manual backfills can be re-run from
    # the web service's Shell tab where the disk lives.
    #
    # `dockerCommand` overrides the image's CMD for Docker-runtime services.
    # (`startCommand` is only valid for native runtimes — python, node, etc.)
    # Same image as web; this CMD swap is what makes it a worker dyno.
    dockerCommand: "python -m backend.app.services.prices.scheduler"
    envVars:
      # Inherit the same secrets as the web service.
      - fromService:
          type: web
          name: alphagraph-backend
          envVarKey: POSTGRES_URI
        key: POSTGRES_URI
      - fromService:
          type: web
          name: alphagraph-backend
          envVarKey: AUTH_DATABASE_URI
        key: AUTH_DATABASE_URI
      - fromService:
          type: web
          name: alphagraph-backend
          envVarKey: TOKEN_ENCRYPTION_KEY
        key: TOKEN_ENCRYPTION_KEY
      - fromService:
          type: web
          name: alphagraph-backend
          envVarKey: ANTHROPIC_API_KEY
        key: ANTHROPIC_API_KEY
      - key: PYTHONIOENCODING
        value: utf-8

# Render note: a single Render Disk attaches to exactly ONE service.
# We resolve this for v1 by giving the disk to web only (worker is
# stateless — its job is to UPSERT into Postgres, not write parquets).
#
# When the worker needs to persist parquets too (full price backfills
# writing to disk), switch to S3:
#   - Set STORAGE_BACKEND=s3 + S3_* env vars on both services
#   - Both services then read/write the same Backblaze B2 (or AWS S3) bucket
#   - Add `boto3>=1.34` to backend/requirements.txt (already present)
#
# See `docs/deployment_runbook.md` Phase 3 for the S3 migration steps.
# `backend/app/core/storage.py` already supports the FS↔S3 swap with one env-var flip.
