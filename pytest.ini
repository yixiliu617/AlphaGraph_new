[pytest]
# Run from the project root: pytest
# pythonpath = "." ensures "from backend.app..." imports resolve correctly.
pythonpath = .
testpaths  = backend/tests

# ---------------------------------------------------------------------------
# Markers - every test must declare one of these.
# Run a single tier:
#   pytest -m unit          # fast, zero external services
#   pytest -m integration   # SQLite only, no Gemini/Pinecone/Neo4j
#   pytest -m e2e           # all live services required
# ---------------------------------------------------------------------------
markers =
    unit:        No external services required - runs on every commit (fast)
    integration: Requires SQLite only - no Gemini, Pinecone, or Neo4j
    e2e:         Requires all live services (Gemini API key, Pinecone, Neo4j)

# Fail loudly on unknown markers so tests don't silently run in the wrong tier.
addopts = --strict-markers
